name: autoheat
description: "AutoHeat — управление подогревом сидений Changan на головном устройстве Android Automotive."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  get_it: ^8.0.3
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  flutter_background_service: ^5.0.5
  android_automotive_plugin:
    path: packages/android_automotive_plugin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.8.0
  fake_async: ^1.3.3
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSans/NotoSans-Regular.ttf
          weight: 400
        - asset: fonts/NotoSans/NotoSans-Medium.ttf
          weight: 500
        - asset: fonts/NotoSans/NotoSans-Bold.ttf
          weight: 700
